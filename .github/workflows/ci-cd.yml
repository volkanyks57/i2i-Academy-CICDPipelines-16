name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Step A - Set up Python and install dependencies
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Step B - Run unit tests with pytest
        run: pytest test_app.py -v

      - name: Step C - Run Selenium UI test in headless mode
        run: python ui_test.py

      - name: Step D - Deployment confirmation
        run: echo "All tests passed! Application successfully deployed to production."
